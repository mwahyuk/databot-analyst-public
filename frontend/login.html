<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DataBot Enterprise</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1a1a2e 0%, #0f0f1a 100%);
            overflow: hidden;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: var(--space-xl);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-md);
        }
        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: var(--space-xl);
        }
        .form-group {
            text-align: left;
            margin-bottom: var(--space-lg);
        }
        .form-group label {
            display: block;
            margin-bottom: var(--space-xs);
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            color: white;
            transition: all var(--transition-fast);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-login {
            width: 100%;
            padding: var(--space-md);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-switch {
            margin-top: var(--space-lg);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .auth-switch a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        #auth-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: var(--space-md);
            display: none;
        }
        .demo-divider {
            display: flex; align-items: center; gap: 12px;
            margin-top: var(--space-xl); color: var(--text-muted); font-size: 0.8rem;
        }
        .demo-divider::before, .demo-divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
        }
        .btn-demo {
            width: 100%; padding: var(--space-md); margin-top: var(--space-md);
            background: transparent; border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-md); color: var(--text-muted);
            font-weight: 500; cursor: pointer; font-size: 0.9rem;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-demo:hover { border-color: var(--primary); color: white; background: rgba(255,255,255,0.03); }
        .btn-demo:active { transform: scale(0.98); }
        .btn-demo:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">DataBot <span style="font-weight: 300;">Enterprise</span></div>
        <div id="auth-title" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 8px;">Selamat Datang Kembali</div>
        <div class="login-subtitle">Silakan login untuk mengakses analisis data</div>

        <div id="auth-error"></div>

        <form id="auth-form">
            <div class="form-group" id="name-group" style="display: none;">
                <label>Nama Lengkap</label>
                <input type="text" id="full_name" class="form-input" placeholder="Masukkan nama Anda">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-input" placeholder="contoh@perusahaan.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btn-submit">Login</button>
        </form>

        <div class="auth-switch">
            <span id="switch-text">Belum punya akun?</span> 
            <a href="#" id="switch-auth">Daftar Sekarang</a>
        </div>

        <div class="demo-divider">atau</div>
        <button type="button" class="btn-demo" id="btn-demo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            Coba Bot (Demo)
        </button>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
